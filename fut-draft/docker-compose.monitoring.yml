services:
  prometheus:
    build:
      context: ./monitoring
      dockerfile: prometheus.Dockerfile
    image: fut-draft-prometheus:latest
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090"
    volumes:
      - prometheus-data:/prometheus

  grafana:
    build:
      context: ./monitoring
      dockerfile: grafana.Dockerfile
    image: fut-draft-grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SERVER_DOMAIN: grafana.squaddraft.ru
      GF_SERVER_ROOT_URL: https://grafana.squaddraft.ru
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/fut-draft-overview.json
    ports:
      - "3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
  prometheus-data:
